name: Documentation

on:
  push:
    branches:
      - master
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "requirements-docs.txt"
      - "requirements-docs.in"
      - ".github/workflows/docs.yaml"
  workflow_dispatch:

permissions:
  contents: read

# Never cancel a deploy mid-flight: the site is replaced wholesale, so a
# cancelled run can leave the artifact half-uploaded. Queue instead.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Documentation
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          # git-revision-date-localized reads each page's last commit for the
          # footer date; a shallow clone has no history to read it from.
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.14.6"
          cache: pip
          cache-dependency-path: requirements-docs.txt

      - name: Install dependencies
        run: pip install --requirement requirements-docs.txt

      # --strict fails the build on warnings; mkdocs.yml's validation block is
      # what makes a dead anchor, an unrecognized link and a page missing from
      # the nav warnings at all. Both halves are needed — see the comment there.
      - name: Build documentation (strict mode)
        run: mkdocs build --strict

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site

      # Unlike a gh-pages branch push, this waits on GitHub's own "pages build
      # and deployment" and fails if it does not converge — so a stalled deploy
      # turns this job red instead of leaving a stale site behind a green run.
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
