name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      # The tap token is only used by the LAST job, long after the container is
      # pushed and the release is public. A missing secret would therefore be
      # discovered as a red run on top of a published release with no formula.
      # Fail before anything leaves the runner instead.
      - name: Require the Homebrew tap token
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          if [ -z "${TAP_TOKEN}" ]; then
            echo "::error::HOMEBREW_TAP_GITHUB_TOKEN is not set — the Homebrew formula could not be published." >&2
            echo "Add a PAT with write access to lexfrei/homebrew-tap as a repository secret." >&2
            exit 1
          fi

  build-and-push:
    name: Build (${{ matrix.arch }})
    needs: preflight
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Login to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./Containerfile
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=ghcr.io/${{ github.repository }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=build-${{ matrix.arch }}
          cache-to: type=gha,scope=build-${{ matrix.arch }},mode=max
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.version'] }}
            REVISION=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.revision'] }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-manifests:
    name: Merge Manifests
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: digests-*
          path: /tmp/digests
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Login to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          set -euo pipefail

          mapfile -t tag_args < <(jq --raw-output '.tags[] | "-t", .' <<< "$DOCKER_METADATA_OUTPUT_JSON")

          images=()
          for digest_file in *; do
            [[ -f "$digest_file" ]] || continue
            images+=("ghcr.io/${{ github.repository }}@sha256:${digest_file}")
          done

          docker buildx imagetools create "${tag_args[@]}" "${images[@]}"

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ fromJSON(steps.meta.outputs.json).tags[0] }}

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign container images
        run: |
          mapfile -t tags < <(echo "$DOCKER_METADATA_OUTPUT_TAGS" | tr '\n' ' ' | xargs -n1)
          for tag in "${tags[@]}"; do
            echo "Signing ${tag}"
            cosign sign --yes "${tag}"
          done

      - name: Generate summary
        run: |
          IMAGE_TAG="${{ fromJSON(steps.meta.outputs.json).tags[0] }}"

          {
            echo "## Container Image"
            echo ""
            echo "### Tags"
            echo '```'
            echo "$DOCKER_METADATA_OUTPUT_TAGS"
            echo '```'
            echo ""
            echo "### Platforms"
            echo "- linux/amd64"
            echo "- linux/arm64"
            echo ""
            echo "### Verify Signature"
            echo '```bash'
            echo "cosign verify ${IMAGE_TAG} \\"
            echo "  --certificate-identity-regexp='^https://github.com/${{ github.repository }}/\\.github/workflows/release\\.yml@refs/tags/v' \\"
            echo "  --certificate-oidc-issuer=https://token.actions.githubusercontent.com"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: merge-manifests
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Generate release notes
        run: |
          CURRENT_TAG="${GITHUB_REF_NAME}"
          PREV_TAG=$(git describe --tags --abbrev=0 "${CURRENT_TAG}^" 2>/dev/null || true)

          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log "${PREV_TAG}..HEAD" --format="%s" --no-merges)
          else
            COMMITS=$(git log --format="%s" --no-merges)
          fi

          CHANGELOG=""
          while IFS= read -r commit; do
            [ -z "$commit" ] && continue

            if [[ "$commit" =~ ^(feat|fix|security|refactor|docs|perf|build)(\([^\)]+\))?:\ (.+)$ ]]; then
              TYPE="${BASH_REMATCH[1]}"
              SCOPE="${BASH_REMATCH[2]}"
              DESC="${BASH_REMATCH[3]}"
              SCOPE="${SCOPE#\(}"; SCOPE="${SCOPE%\)}"

              case "$TYPE" in
                feat) emoji="✨" ;;
                fix) emoji="🐛" ;;
                security) emoji="🔒" ;;
                *) emoji="🔄" ;;
              esac

              if [ -n "$SCOPE" ]; then
                CHANGELOG="${CHANGELOG}- ${emoji} ${SCOPE}: ${DESC}"$'\n'
              else
                CHANGELOG="${CHANGELOG}- ${emoji} ${DESC}"$'\n'
              fi
            fi
          done <<< "$COMMITS"

          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="No user-facing changes in this release."
          fi

          IMAGE="ghcr.io/${{ github.repository }}"

          {
            echo "## Changelog"
            echo ""
            echo "${CHANGELOG}"
            echo "## Container Image"
            echo ""
            echo '```bash'
            echo "docker pull ${IMAGE}:${GITHUB_REF_NAME}"
            echo '```'
            echo ""
            echo "## Verify the Container"
            echo ""
            echo '```bash'
            echo "cosign verify \\"
            echo "  ${IMAGE}:${GITHUB_REF_NAME} \\"
            echo "  --certificate-identity-regexp='^https://github.com/${{ github.repository }}/\\.github/workflows/release\\.yml@refs/tags/v' \\"
            echo "  --certificate-oidc-issuer=https://token.actions.githubusercontent.com"
            echo '```'
            echo ""
            echo "## Verify the Binaries"
            echo ""
            echo "The checksums file is signed; the archives are covered by it."
            echo ""
            echo '```bash'
            echo "cosign verify-blob checksums.txt \\"
            echo "  --bundle checksums.txt.bundle \\"
            echo "  --certificate-identity-regexp='^https://github.com/${{ github.repository }}/\\.github/workflows/release\\.yml@refs/tags/v' \\"
            echo "  --certificate-oidc-issuer=https://token.actions.githubusercontent.com"
            echo ""
            echo "shasum --algorithm 256 --check --ignore-missing checksums.txt  # sha256sum on Linux"
            echo '```'
          } > release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          body_path: release-notes.md
          draft: false
          # v1.3.0-rc1 and friends carry a hyphen; a plain vX.Y.Z never does.
          prerelease: ${{ contains(github.ref_name, '-') }}

  binaries:
    name: Binaries and Homebrew
    runs-on: ubuntu-latest
    permissions:
      contents: write # upload the archives to the existing release
      id-token: write # keyless cosign signature over the checksums
    # Runs after the GitHub release exists: GoReleaser uploads the archives to
    # it and leaves the notes create-release wrote alone (release.mode:
    # keep-existing).
    needs: create-release
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          version: "v2.17.0"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
