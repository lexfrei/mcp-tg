name: PR

on:
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: latest

  goreleaser:
    name: Release Config
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # keyless cosign, so the signs block is exercised here too
    # The release config is only executed on a v* tag, in the LAST job — after
    # the container is pushed and the GitHub release is already public. A broken
    # template or an unbuildable target would leave a published release with no
    # binaries and no formula. A snapshot run exercises build -> archive ->
    # formula without publishing anything, so it fails here instead.
    #
    # `goreleaser check` is NOT the gate: it exits non-zero on the deliberate
    # `brews` deprecation (see CLAUDE.md).
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Install cosign
        # A fork PR cannot mint an OIDC token, so signing is only exercised on
        # branches of this repository. Everything else runs either way.
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: GoReleaser snapshot
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          version: "v2.17.0"
          # A snapshot publishes nothing; a keyless sign-blob over a snapshot
          # checksums file only records the hash of a file that never leaves
          # the runner. Signing runs here so the hand-written cosign arguments
          # are not first executed on a tag, after the release is public.
          args: >-
            release --snapshot --clean --parallelism 1
            ${{ github.event.pull_request.head.repo.full_name == github.repository && ' ' || '--skip=sign' }}

      - name: Verify the signature was actually produced
        # cosign can exit 0 having written nothing (it did, with the pre-v3
        # flags). Assert the artifact, not the exit code.
        if: github.event.pull_request.head.repo.full_name == github.repository
        run: |
          test -s dist/checksums.txt.bundle \
            || { echo "::error::cosign produced no bundle — the release would ship unsigned"; exit 1; }

      - name: Verify the formula parses and lints
        # install/service/test/caveats are hand-written Ruby pasted into YAML.
        # GoReleaser substitutes them as strings and never parses them, so a
        # missing `end` writes a broken formula and still exits 0 — every brew
        # install would then fail. ruby -c catches syntax; brew style also
        # catches DSL mistakes that parse fine and blow up at install time.
        run: |
          ruby -c dist/homebrew/Formula/mcp-tg.rb
          # Homebrew ships on the runner image but is NOT on PATH.
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          brew style dist/homebrew/Formula/mcp-tg.rb

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test -race -count=1 ./...

  docs:
    name: Docs
    runs-on: ubuntu-latest
    # The site only builds on a push to master, where a failure would land on
    # the published documentation. Build it here too so a broken nav entry or
    # a cross-reference lost in an edit fails on the PR instead.
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.x"

      - name: Install MkDocs Material
        run: pip install mkdocs-material==9.7.6

      - name: Build site
        run: mkdocs build --strict

  build-and-push:
    name: Build (${{ matrix.arch }})
    needs: [lint, test]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./Containerfile
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=ttl.sh/mcp-tg,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=build-${{ matrix.arch }}
          cache-to: type=gha,scope=build-${{ matrix.arch }},mode=max
          build-args: |
            VERSION=pr-${{ github.event.pull_request.number }}
            REVISION=${{ github.sha }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-manifests:
    name: Merge Manifests
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: digests-*
          path: /tmp/digests
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          set -euo pipefail

          PR_NUMBER="${{ github.event.pull_request.number }}"
          IMAGE_NAME="ttl.sh/mcp-tg"
          TAG="pr-${PR_NUMBER}-1d"

          images=()
          for digest_file in *; do
            [[ -f "$digest_file" ]] || continue
            images+=("${IMAGE_NAME}@sha256:${digest_file}")
          done

          docker buildx imagetools create \
            --tag "${IMAGE_NAME}:${TAG}" \
            "${images[@]}"

      - name: Inspect image
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          docker buildx imagetools inspect "ttl.sh/mcp-tg:pr-${PR_NUMBER}-1d"

      - name: Generate build summary
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          IMAGE_TAG="ttl.sh/mcp-tg:pr-${PR_NUMBER}-1d"

          {
            echo "## Multi-arch Container Image"
            echo ""
            echo "### Image Tag"
            echo "- \`${IMAGE_TAG}\`"
            echo ""
            echo "### Platforms"
            echo "- linux/amd64"
            echo "- linux/arm64"
            echo ""
            echo "### Pull Command"
            echo '```bash'
            echo "docker pull ${IMAGE_TAG}"
            echo '```'
            echo ""
            echo "> **Note:** Image expires in 24 hours (ttl.sh)"
          } >> "$GITHUB_STEP_SUMMARY"

  notify:
    name: Notify PR
    runs-on: ubuntu-latest
    needs: merge-manifests
    steps:
      - name: Check if first build
        id: first_build
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          result-encoding: string
          script: |
            const labels = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number
            });

            const hasLabel = labels.data.some(label => label.name === 'Container Available');
            return hasLabel ? 'false' : 'true';

      - name: Add label
        if: steps.first_build.outputs.result == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              labels: ['Container Available']
            })

      - name: Comment on PR
        if: steps.first_build.outputs.result == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const imageTag = `ttl.sh/mcp-tg:pr-${prNumber}-1d`;

            github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Container image available\n\n**Multi-arch image (amd64 + arm64):**\n\`\`\`bash\ndocker pull ${imageTag}\n\`\`\`\n\n> **Note:** Image is rebuilt on every push and expires after 24 hours (hosted on ttl.sh).`
            })
