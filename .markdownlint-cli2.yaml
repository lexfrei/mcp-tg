# markdownlint-cli2 configuration

# GitHub templates are forms, not documents: they open with the first section
# a contributor fills in, so MD041 (first line must be a top-level heading)
# does not apply. Adding an H1 purely to satisfy it would render as a stray
# title inside every new pull request.
ignores:
  # Other branches' checkouts: .claude/worktrees holds whole copies of this
  # repository, whose Markdown is not this branch's to lint. The docs-link
  # test skips it for the same reason.
  - ".claude/**"
  - ".github/pull_request_template.md"
  - ".github/PULL_REQUEST_TEMPLATE/**"
  - ".github/ISSUE_TEMPLATE/**"
  - "site/**"
  - "node_modules/**"

# Rule configuration
config:
  # Disable line length rule - technical documentation often needs longer lines
  MD013: false
  # Allow both duplicate headings - common in docs with multiple sections
  MD024: false
  # Allow ordered lists with any prefix style (1. 2. 3. or all 1.)
  MD029: false
  # Allow any spacing after list markers - MkDocs compatibility
  MD030: false
  # Allow inline HTML for badges, special formatting
  MD033: false
  # Allow bare URLs - common in technical docs
  MD034: false
  # Allow both fenced and indented code blocks
  MD046: false
  # Disable table column style rule - compact style is fine
  MD060: false
