version: 2

builds:
  - main: ./cmd/mcp-tg
    binary: mcp-tg
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      # Match what the container build injects (docker/metadata-action keeps
      # the leading v, and passes the full SHA), so one release does not
      # introduce itself two different ways over MCP and in Telegram's
      # device list.
      - -X main.version=v{{.Version}}
      - -X main.revision={{.FullCommit}}

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

# A formula rather than a cask: casks are macOS-only, and a formula also
# gives `brew services`, which is how this server is meant to run — one
# shared HTTP daemon per machine. The section is deprecated in GoReleaser
# in favour of homebrew_casks, which would cost both Linux and the
# service block; Homebrew itself still supports formulae.
brews:
  - repository:
      owner: lexfrei
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/lexfrei/mcp-tg"
    description: "MCP server for the Telegram Client API (MTProto, user account)"
    license: "BSD-3-Clause"
    install: |
      bin.install "mcp-tg"
    test: |
      # The binary has no --version flag, and every real command talks to
      # Telegram. Missing credentials is the one deterministic offline path.
      assert_match "TELEGRAM_APP_ID is required",
        shell_output("#{bin}/mcp-tg 2>&1", 1)
    service: |
      run [opt_bin/"mcp-tg"]
      keep_alive true
      log_path var/"log/mcp-tg.log"
      error_log_path var/"log/mcp-tg.log"
      environment_variables MCP_HTTP_ONLY: "true", MCP_HTTP_HOST: "127.0.0.1", MCP_HTTP_PORT: "8787"
    caveats: |
      mcp-tg needs Telegram application credentials and a logged-in session
      before it can serve anything. Both steps are one-time:

        1. Get an app id and hash at https://my.telegram.org/apps, then export
           TELEGRAM_APP_ID and TELEGRAM_APP_HASH (the public build ships none).

        2. Log in interactively — the daemon cannot do this itself:

             mcp-tg login

           The session goes to the OS keychain. Pass --insecure-storage only if
           the machine has no keychain (a container, or headless Linux without a
           Secret Service).

      Then run it as a shared daemon on 127.0.0.1:8787:

        brew services start mcp-tg

      The service reads its configuration from the environment, and a login
      shell's rc file is NOT part of it — use `launchctl setenv` on macOS, or
      the service manager's environment on Linux. It needs:

        TELEGRAM_APP_ID, TELEGRAM_APP_HASH  — always
        TELEGRAM_SESSION_INSECURE=true      — ONLY if you logged in with
                                              --insecure-storage; the session
                                              backend must match, or the daemon
                                              cannot find the session it wrote

      Miss any of them and the daemon exits at startup and keep_alive restarts
      it forever. Check with `brew services list` and read the log at
      $(brew --prefix)/var/log/mcp-tg.log.

checksum:
  name_template: "checksums.txt"

# The container is signed with cosign and the release notes teach people to
# verify it. Binaries that hand out a full-access Telegram session should not
# be the unsigned half of the same release.
signs:
  - cmd: cosign
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - "--output-certificate=${certificate}"
      - "--output-signature=${signature}"
      - "${artifact}"
      - --yes
    artifacts: checksum
    output: true

release:
  # release.yml has already created the GitHub release, with its own notes and
  # the container digest summary. Pinned rather than left implicit: mode governs
  # the NOTES, not the artifacts, and the one plausible edit here — append —
  # would stack a second, GoReleaser-generated changelog under the handwritten
  # one on every release. keep-existing is the default; this says it out loud.
  mode: keep-existing
  # A tag like v1.3.0-rc1 must not become the latest release.
  prerelease: auto
