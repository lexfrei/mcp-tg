name: Pages

on:
  push:
    branches: [master]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

# Only one deployment at a time, and never cancel one mid-flight: a cancelled
# deploy-pages run can leave the Pages site pointing at a half-uploaded
# artifact. Queue instead.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.x"

      # Pinned, like every action SHA in this repository. MkDocs 2.0 removes
      # the plugin system and the theming system with no migration path, so an
      # unpinned install would break this site on the day it releases — the
      # Material team publishes that warning on every build.
      - name: Install MkDocs Material
        run: pip install mkdocs-material==9.7.6

      # --strict turns warnings into a failed build; mkdocs.yml's validation
      # block is what makes a broken link, a dead anchor or a page missing from
      # the nav a warning in the first place. Both halves are needed: --strict
      # alone reports all three at INFO and exits 0.
      - name: Build site
        run: mkdocs build --strict

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
